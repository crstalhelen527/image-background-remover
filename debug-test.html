<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBG 调试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        #log {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>QuickBG 上传功能调试</h1>
    
    <div class="test-section">
        <h2>1. 检查DOM元素</h2>
        <button onclick="checkElements()">检查元素</button>
        <div id="element-check"></div>
    </div>
    
    <div class="test-section">
        <h2>2. 测试文件选择按钮</h2>
        <button id="test-select-btn">点击我选择文件</button>
        <input type="file" id="test-file-input" accept="image/*" style="display: none;">
        <div id="file-test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. 测试拖放功能</h2>
        <div id="test-drop-zone" style="border: 2px dashed #ccc; padding: 50px; text-align: center; margin: 20px 0;">
            拖放图片到这里
        </div>
        <div id="drop-test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. 测试API连接</h2>
        <button onclick="testAPI()">测试API连接</button>
        <div id="api-test-result"></div>
    </div>
    
    <div class="test-section">
        <h2>调试日志</h2>
        <div id="log"></div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<span class="${type}">[${timestamp}] ${message}</span>\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // 1. 检查DOM元素
        function checkElements() {
            log('检查DOM元素...');
            const elements = [
                { id: 'select-file-btn', desc: '选择文件按钮' },
                { id: 'file-input', desc: '文件输入框' },
                { id: 'drop-zone', desc: '拖放区域' },
                { id: 'process-btn', desc: '处理按钮' },
                { id: 'download-btn', desc: '下载按钮' },
                { id: 'reset-btn', desc: '重置按钮' }
            ];
            
            const resultDiv = document.getElementById('element-check');
            resultDiv.innerHTML = '';
            
            elements.forEach(element => {
                const el = document.getElementById(element.id);
                if (el) {
                    resultDiv.innerHTML += `<div class="success">✅ ${element.desc} (${element.id}) 存在</div>`;
                    log(`找到元素: ${element.id}`, 'success');
                } else {
                    resultDiv.innerHTML += `<div class="error">❌ ${element.desc} (${element.id}) 不存在</div>`;
                    log(`未找到元素: ${element.id}`, 'error');
                }
            });
        }
        
        // 2. 测试文件选择按钮
        document.getElementById('test-select-btn').addEventListener('click', () => {
            log('点击测试选择按钮');
            document.getElementById('test-file-input').click();
        });
        
        document.getElementById('test-file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const result = `✅ 选择了文件: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                document.getElementById('file-test-result').innerHTML = `<div class="success">${result}</div>`;
                log(result, 'success');
            }
        });
        
        // 3. 测试拖放功能
        const dropZone = document.getElementById('test-drop-zone');
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#007bff';
            dropZone.style.backgroundColor = '#f0f8ff';
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#ccc';
            dropZone.style.backgroundColor = '';
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#ccc';
            dropZone.style.backgroundColor = '';
            
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                const result = `✅ 拖放了文件: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;
                document.getElementById('drop-test-result').innerHTML = `<div class="success">${result}</div>`;
                log(result, 'success');
            }
        });
        
        // 4. 测试API连接
        async function testAPI() {
            log('测试API连接...');
            const resultDiv = document.getElementById('api-test-result');
            resultDiv.innerHTML = '<div class="info">测试中...</div>';
            
            try {
                // 测试健康检查
                const healthResponse = await fetch('/health');
                if (healthResponse.ok) {
                    const healthData = await healthResponse.json();
                    log(`✅ 健康检查通过: ${healthData.service}`, 'success');
                    resultDiv.innerHTML += `<div class="success">✅ 健康检查通过</div>`;
                } else {
                    throw new Error(`健康检查失败: ${healthResponse.status}`);
                }
                
                // 测试API端点
                const testImage = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
                const apiResponse = await fetch('/api/remove-bg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: testImage })
                });
                
                if (apiResponse.ok) {
                    const apiData = await apiResponse.json();
                    log(`✅ API端点响应正常: ${apiData.success ? '成功' : '失败'}`, 'success');
                    resultDiv.innerHTML += `<div class="success">✅ API端点响应正常</div>`;
                } else {
                    throw new Error(`API请求失败: ${apiResponse.status}`);
                }
                
            } catch (error) {
                log(`❌ API测试失败: ${error.message}`, 'error');
                resultDiv.innerHTML = `<div class="error">❌ API测试失败: ${error.message}</div>`;
            }
        }
        
        // 页面加载时自动检查
        window.addEventListener('load', () => {
            log('页面加载完成，开始调试...');
            checkElements();
            
            // 测试原页面的按钮
            const originalBtn = document.getElementById('select-file-btn');
            if (originalBtn) {
                originalBtn.addEventListener('click', () => {
                    log('点击了原页面的选择文件按钮');
                });
            }
            
            const originalFileInput = document.getElementById('file-input');
            if (originalFileInput) {
                originalFileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        log(`原页面选择了文件: ${file.name}`, 'success');
                    }
                });
            }
        });
        
        // 捕获控制台错误
        window.addEventListener('error', (event) => {
            log(`JavaScript错误: ${event.message}`, 'error');
        });
    </script>
</body>
</html>
