name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

env:
  NODE_VERSION: '18'
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  REMOVEBG_API_KEY: ${{ secrets.REMOVEBG_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
        env:
          REMOVEBG_API_KEY: ${{ env.REMOVEBG_API_KEY }}
          NODE_ENV: production
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: da9508a0610236e7085687e13c88bf59
          projectName: quickbg
          directory: ./public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}
          wranglerVersion: '3'
      
      - name: Verify deployment
        run: |
          echo "✅ Deployment completed!"
          echo "Project: quickbg"
          echo "Account ID: da9508a0610236e7085687e13c88bf59"
          echo "GitHub Token: ${{ secrets.GITHUB_TOKEN != '' && 'Configured' || 'Not configured' }}"
          echo "Cloudflare Token: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && 'Configured' || 'Not configured' }}"
      
      - name: Create deployment status
        if: github.event_name == 'push'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              auto_merge: false,
              required_contexts: [],
              payload: {
                environment: 'production',
                description: 'Deployed to Cloudflare Pages'
              },
              environment: 'production',
              transient_environment: false,
              production_environment: true
            })