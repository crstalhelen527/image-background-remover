name = "quickbg-worker"
main = "worker/index.js"
compatibility_date = "2024-03-22"
compatibility_flags = ["nodejs_compat"]

# 开发环境使用workers.dev子域名
workers_dev = true

# 环境变量（在部署时通过wrangler secret设置）
[vars]
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:8787"

# 构建配置
[build]
command = ""
watch_dir = "worker"

# 开发服务器配置
[dev]
port = 8787
local_protocol = "http"
ip = "127.0.0.1"