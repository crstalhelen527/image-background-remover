<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickBG - 快速图片背景去除工具</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f9fafb;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--gray-800);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: calc(100vh - 40px);
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .logo i {
            font-size: 3rem;
        }

        .tagline {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            backdrop-filter: blur(10px);
        }

        main {
            padding: 2rem;
        }

        .upload-section {
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 3px dashed var(--gray-300);
            border-radius: var(--radius);
            padding: 3rem;
            text-align: center;
            background: var(--light);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: #f0f9ff;
        }

        .upload-area.dragover {
            border-color: var(--secondary);
            background: #f0fdf4;
        }

        .upload-icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .upload-text h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--dark);
        }

        .upload-text p {
            color: var(--gray-600);
            margin-bottom: 1.5rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .btn:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-process {
            background: var(--secondary);
        }

        .btn-process:hover:not(:disabled) {
            background: #0da271;
        }

        .btn-download {
            background: var(--primary);
        }

        .btn-reset {
            background: var(--gray-400);
        }

        .btn-reset:hover {
            background: var(--gray-600);
        }

        .preview-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .preview-section {
                grid-template-columns: 1fr;
            }
        }

        .preview-container {
            background: var(--light);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
        }

        .preview-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .preview-image {
            width: 100%;
            height: 300px;
            background: white;
            border-radius: var(--radius);
            border: 2px dashed var(--gray-300);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .control-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--gray-200);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            height: 8px;
            background: var(--gray-200);
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .notification {
            padding: 1rem;
            border-radius: var(--radius);
            margin: 1rem 0;
            display: none;
        }

        .notification.show {
            display: block;
        }

        .notification.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .notification.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .notification.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        footer {
            background: var(--light);
            padding: 1.5rem;
            text-align: center;
            color: var(--gray-600);
            border-top: 1px solid var(--gray-200);
        }

        .file-info {
            background: var(--light);
            padding: 1rem;
            border-radius: var(--radius);
            margin: 1rem 0;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        #file-input {
            display: none;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-magic"></i>
                QuickBG
            </div>
            <p class="tagline">快速、简单、专业的图片背景去除工具</p>
            
            <div class="features">
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span>快速处理</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>隐私保护</span>
                </div>
                <div class="feature">
                    <i class="fas fa-gift"></i>
                    <span>完全免费</span>
                </div>
                <div class="feature">
                    <i class="fas fa-mobile-alt"></i>
                    <span>响应式设计</span>
                </div>
                <div class="feature">
                    <i class="fas fa-cloud"></i>
                    <span>边缘计算</span>
                </div>
                <div class="feature">
                    <i class="fas fa-star"></i>
                    <span>专业效果</span>
                </div>
            </div>
        </header>

        <main>
            <div class="upload-section">
                <div class="upload-area" id="drop-zone">
                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                    <div class="upload-text">
                        <h3>上传图片</h3>
                        <p>拖放图片到这里，或点击按钮选择文件</p>
                        <button class="btn" id="select-file-btn">
                            <i class="fas fa-folder-open"></i>
                            选择图片
                        </button>
                    </div>
                    <input type="file" id="file-input" accept="image/*">
                </div>

                <div class="file-info" id="file-info">
                    <div>
                        <strong>已选择文件:</strong>
                        <span id="file-name"></span>
                        <span id="file-size"></span>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <div class="preview-container">
                    <div class="preview-title">
                        <i class="fas fa-image"></i>
                        原始图片
                    </div>
                    <div class="preview-image" id="original-preview">
                        <div style="color: var(--gray-400);">
                            <i class="fas fa-image fa-3x"></i>
                            <p>等待上传图片</p>
                        </div>
                    </div>
                </div>

                <div class="preview-container">
                    <div class="preview-title">
                        <i class="fas fa-magic"></i>
                        处理结果
                    </div>
                    <div class="preview-image" id="result-preview">
                        <div style="color: var(--gray-400);">
                            <i class="fas fa-wand-magic-sparkles fa-3x"></i>
                            <p>等待处理结果</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在处理图片，请稍候...</p>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
            </div>

            <div class="notification" id="notification"></div>

            <div class="control-buttons">
                <button class="btn btn-process" id="process-btn" disabled>
                    <i class="fas fa-magic"></i>
                    去除背景
                </button>
                <button class="btn btn-download" id="download-btn" disabled>
                    <i class="fas fa-download"></i>
                    下载PNG
                </button>
                <button class="btn btn-reset" id="reset-btn">
                    <i class="fas fa-redo"></i>
                    重新开始
                </button>
            </div>
        </main>

        <footer>
            <p>© 2024 QuickBG - 基于 Remove.bg API 和 Cloudflare Workers 构建</p>
            <p style="font-size: 0.875rem; margin-top: 0.5rem; color: var(--gray-500);">
                免费额度: 50张/月 | 最大文件: 5MB | 支持格式: JPG, PNG, WebP
            </p>
        </footer>
    </div>

    <script>
        class QuickBGApp {
            constructor() {
                this.currentFile = null;
                this.processedImage = null;
                this.isProcessing = false;
                this.workerUrl = '/api/remove-bg';

                this.init();
            }

            init() {
                this.bindEvents();
                this.updateUI();
            }

            bindEvents() {
                // 文件选择按钮
                document.getElementById('select-file-btn').addEventListener('click', () => {
                    document.getElementById('file-input').click();
                });

                // 文件输入变化
                document.getElementById('file-input').addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        this.handleFileSelect(e.target.files[0]);
                    }
                });

                // 拖放上传
                const dropZone = document.getElementById('drop-zone');
                dropZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    dropZone.classList.add('dragover');
                });

                dropZone.addEventListener('dragleave', () => {
                    dropZone.classList.remove('dragover');
                });

                dropZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('dragover');
                    
                    if (e.dataTransfer.files.length > 0) {
                        this.handleFileSelect(e.dataTransfer.files[0]);
                    }
                });

                // 处理按钮
                document.getElementById('process-btn').addEventListener('click', () => {
                    this.processImage();
                });

                // 下载按钮
                document.getElementById('download-btn').addEventListener('click', () => {
                    this.downloadImage();
                });

                // 重置按钮
                document.getElementById('reset-btn').addEventListener('click', () => {
                    this.reset();
                });
            }

            async handleFileSelect(file) {
                try {
                    // 验证文件
                    this.validateFile(file);
                    
                    // 显示加载状态
                    this.showNotification('正在加载图片...', 'info');
                    
                    // 保存文件引用
                    this.currentFile = file;
                    
                    // 预览原始图片
                    await this.previewOriginalImage(file);
                    
                    // 显示文件信息
                    this.showFileInfo(file);
                    
                    // 更新UI状态
                    this.updateUI();
                    
                    this.showNotification('图片加载成功！', 'success');
                    
                } catch (error) {
                    this.showNotification(error.message, 'error');
                    console.error('File selection error:', error);
                }
            }

            validateFile(file) {
                const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/webp'];
                const MAX_SIZE = 5 * 1024 * 1024; // 5MB

                if (!ALLOWED_TYPES.includes(file.type)) {
                    throw new Error('请选择 JPG、PNG 或 WebP 格式的图片');
                }

                if (file.size > MAX_SIZE) {
                    throw new Error('文件太大，最大支持 5MB');
                }
            }

            showFileInfo(file) {
                const fileInfo = document.getElementById('file-info');
                const fileName = document.getElementById('file-name');
                const fileSize = document.getElementById('file-size');
                
                fileName.textContent = file.name;
                fileSize.textContent = ` (${(file.size / 1024).toFixed(2)} KB)`;
                fileInfo.classList.add('show');
            }

            async previewOriginalImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const preview = document.getElementById('original-preview');
                        preview.innerHTML = `<img src="${e.target.result}" alt="原始图片">`;
                        resolve();
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            async processImage() {
                if (!this.currentFile || this.isProcessing) return;

                try {
                    this.isProcessing = true;
                    this.showLoading(true);
                    this.showNotification('正在去除背景...', 'info');
                    
                    // 更新进度条
                    this.updateProgress(30);
                    
                    // 转换文件为base64
                    const base64 = await this.fileToBase64(this.currentFile);
                    this.updateProgress(60);
                    
                    // 调用API
